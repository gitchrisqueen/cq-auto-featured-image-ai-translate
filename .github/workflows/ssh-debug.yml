name: SSH Debug

# Temporary, manual-only diagnostic for the SFTP/SSH deploy auth.
# Does NOT deploy anything. Safe to delete once the deploy works.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ssh-debug:
    name: SSH auth diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Probe SSH key + connection (verbose)
        env:
          SSH_KEY: ${{ secrets.SFTP_SSH_KEY }}
          HOST: ${{ secrets.SFTP_HOST }}
          PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USER }}
          RPATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          echo "=== secret presence (lengths only, no values) ==="
          echo "HOST set:        $([ -n "$HOST" ] && echo yes || echo NO)"
          echo "PORT value:      ${PORT:-(empty)}"
          echo "SSH_USER set:    $([ -n "$SSH_USER" ] && echo yes || echo NO)"
          echo "RPATH value:     ${RPATH:-(empty)}"
          echo "key byte length: $(wc -c < ~/.ssh/id_deploy)"
          echo "key first line:  $(head -1 ~/.ssh/id_deploy)"
          echo "key last line:   $(tail -1 ~/.ssh/id_deploy)"

          echo
          echo "=== private key validity (derives PUBLIC key — safe to print) ==="
          if ssh-keygen -y -f ~/.ssh/id_deploy > /tmp/derived.pub 2>/tmp/keyerr; then
            echo "OK: private key is well-formed."
            echo "Public key fingerprint (compare to SiteGround SSH Keys Manager):"
            ssh-keygen -lf /tmp/derived.pub
            echo "Public key (add THIS to SiteGround if missing):"
            cat /tmp/derived.pub
          else
            echo "FAIL: private key could not be parsed (likely mangled paste / passphrase / CRLF):"
            cat /tmp/keyerr
          fi

          echo
          echo "=== ssh -vvv connection attempt ==="
          ssh -vvv -p "${PORT:-22}" -i ~/.ssh/id_deploy \
            -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20 \
            "$SSH_USER@$HOST" 'echo CONNECTED_OK; whoami; pwd; ls -ld "'"$RPATH"'"' 2>&1 \
            | grep -viE 'debug1: (kex|cipher|mac|compression|expecting|SSH2_MSG|Local|Remote|sending|reserved)' \
            | tail -70 || true
